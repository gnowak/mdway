<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d10;--surf:#15151a;--surf2:#1c1c23;--border:#252530;--accent:#7c6af7;--text:#dddaf0;--muted:#55526b}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);font-size:13px}
#titlebar{position:fixed;top:0;left:0;right:0;height:34px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding-left:10px;gap:8px;z-index:9999;-webkit-app-region:drag;user-select:none}
#app-name{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;flex:1}
.tbtn{-webkit-app-region:no-drag;background:none;border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:600;padding:2px 9px;border-radius:4px;cursor:pointer;letter-spacing:.04em;transition:all .15s}
.tbtn:hover{background:var(--border);color:var(--text)}.tbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.win-controls{display:flex;-webkit-app-region:no-drag;margin-left:6px}
.win-btn{width:44px;height:34px;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s,color .1s;flex-shrink:0}
.win-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.win-close:hover{background:#c42b1c;color:#fff}
#viewport{position:fixed;top:34px;left:0;right:0;bottom:0;overflow:hidden;cursor:default;background-image:radial-gradient(circle,#272737 1px,transparent 1px);background-size:26px 26px}
#canvas{position:absolute;width:0;height:0}
#hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);letter-spacing:.05em;pointer-events:none;white-space:nowrap;opacity:.7;transition:opacity .4s}
#hint.gone{opacity:0}
.card{position:absolute;width:400px;background:var(--surf);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.55);display:flex;flex-direction:column;overflow:hidden;min-width:180px;min-height:60px;transition:box-shadow .18s}
.card:hover{box-shadow:0 12px 48px rgba(0,0,0,.75),0 0 0 1px var(--accent)}
.card-hd{display:flex;align-items:center;gap:5px;padding:6px 9px;background:var(--surf2);border-bottom:1px solid var(--border);cursor:grab;flex-shrink:0}
.card-hd:active{cursor:grabbing}
.badge{font-size:9px;font-weight:800;letter-spacing:.07em;padding:2px 6px;border-radius:3px;color:#fff;flex-shrink:0}
.card-meta{font-size:10px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbtn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 5px;border-radius:3px;font-size:13px;line-height:1;transition:all .1s;-webkit-app-region:no-drag;flex-shrink:0}
.cbtn:hover{background:var(--border);color:var(--text)}.cbtn.on{color:#a78bfa}
.card-bd{overflow-y:auto;overflow-x:hidden;flex:1;user-select:text;max-height:calc(100vh - 120px)}
.card-bd pre{margin:0;padding:11px 13px;background:transparent!important;font-family:'Cascadia Code','Consolas','JetBrains Mono',monospace;font-size:12px;line-height:1.62;white-space:pre-wrap;word-break:break-all}
.card-bd .hljs{background:transparent!important;padding:0}
.card-bd textarea{width:100%;min-height:160px;background:var(--surf);border:none;color:var(--text);padding:11px 13px;resize:none;outline:none;font-family:'Cascadia Code','Consolas',monospace;font-size:12px;line-height:1.62;display:block;user-select:text}
.mdv{padding:14px 16px;line-height:1.75;font-size:13px}
.mdv h1{font-size:1.4em;color:#a78bfa;border-bottom:1px solid var(--border);padding-bottom:4px;margin:0 0 10px}
.mdv h2{font-size:1.15em;margin:14px 0 5px}.mdv h3{font-size:1em;color:var(--muted);margin:10px 0 4px}
.mdv p{margin:5px 0}.mdv a{color:#a78bfa}
.mdv code{font-family:'Cascadia Code','Consolas',monospace;font-size:.85em;background:var(--surf2);border:1px solid var(--border);border-radius:3px;padding:.1em .3em;color:#e879f9}
.mdv pre{background:var(--surf2)!important;border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin:8px 0;overflow-x:auto}
.mdv pre code{background:none;border:none;color:var(--text);padding:0}
.mdv ul,.mdv ol{padding-left:18px;margin:5px 0}.mdv li{margin:3px 0}
.mdv blockquote{border-left:3px solid var(--accent);padding:4px 10px;color:var(--muted);background:var(--surf2);border-radius:0 4px 4px 0;margin:7px 0}
.mdv table{width:100%;border-collapse:collapse;margin:7px 0;font-size:12px}
.mdv th,.mdv td{border:1px solid var(--border);padding:5px 10px}
.mdv th{background:var(--surf2);color:#a78bfa}.mdv tr:nth-child(even){background:rgba(255,255,255,.02)}
.mdv hr{border:none;border-top:1px solid var(--border);margin:12px 0}.mdv img{max-width:100%;border-radius:6px}
.mdv strong{color:var(--text)}.mdv em{color:#c4b5fd}
.mermaid-wrap{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:14px;margin:8px 0;overflow-x:auto;text-align:center}
.mermaid-wrap svg{max-width:100%}
.mermaid-err{color:#ff5f57;font-size:11px;font-family:monospace;white-space:pre-wrap;padding:8px}
.rh{position:absolute;bottom:0;right:0;width:18px;height:18px;cursor:se-resize;opacity:0;transition:opacity .2s;background:linear-gradient(135deg,transparent 55%,var(--muted) 55%)}
.card:hover .rh{opacity:1}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}</style>
<!-- Hide Node globals so mermaid loads as a browser lib -->
<script>window.__nm=window.module;window.__ne=window.exports;delete window.module;delete window.exports;</script>
<script src="node_modules/mermaid/dist/mermaid.min.js"></script>
<script>window.module=window.__nm;window.exports=window.__ne;</script>
<script>
  if(typeof mermaid!=='undefined'){
    mermaid.initialize({startOnLoad:false,theme:'dark',securityLevel:'loose',
      fontFamily:"'Cascadia Code','Consolas',monospace",
      themeVariables:{darkMode:true,background:'#1c1c23',primaryColor:'#7c6af7',
        primaryTextColor:'#dddaf0',primaryBorderColor:'#252530',
        lineColor:'#a78bfa',secondaryColor:'#15151a',tertiaryColor:'#252530'}});
  }
</script>
</head>
<body>

<div id="titlebar">
  <span id="app-name">mdway</span>
  <button class="tbtn on" id="btn-pin">&#128204; pinned</button>
  <button class="tbtn" id="btn-clear">clear all</button>
  <div class="win-controls">
    <button class="win-btn" id="btn-min">&#x2015;</button>
    <button class="win-btn win-close" id="btn-close">&#x2715;</button>
  </div>
</div>

<div id="viewport"><div id="canvas"></div></div>
<div id="hint">Ctrl+V &mdash; new card &nbsp;&middot;&nbsp; drag header &mdash; move &nbsp;&middot;&nbsp; scroll &mdash; pan canvas</div>

<script>'use strict';
const { ipcRenderer } = require('electron');
const hljs   = require('highlight.js');
const { marked } = require('marked');

// marked: basic options only (no renderer override — we post-process instead)
marked.use({ gfm: true, breaks: true });

// ── Canvas state ──
const viewport = document.getElementById('viewport');
const canvas   = document.getElementById('canvas');
let panX = 0, panY = 0, scale = 1, panning = false, panStart = { x: 0, y: 0 };
const MIN_SCALE = 0.15, MAX_SCALE = 3;
let dragState = null, resizeState = null, zTop = 10;

function applyPan() {
  canvas.style.transformOrigin = '0 0';
  canvas.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')';
  const gs = Math.round(26 * scale);
  viewport.style.backgroundSize = gs + 'px ' + gs + 'px';
  viewport.style.backgroundPosition = (panX % gs) + 'px ' + (panY % gs) + 'px';
}

// ── Canvas pan ──
viewport.addEventListener('mousedown', e => {
  if (e.target !== viewport && e.target !== canvas) return;
  panning = true;
  panStart = { x: e.clientX - panX, y: e.clientY - panY };
  viewport.style.cursor = 'grabbing';
  e.preventDefault();
});
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.shiftKey) {
    // Zoom toward cursor
    const factor = e.deltaY > 0 ? 0.92 : 1.08;
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    panX = mx - (mx - panX) * (newScale / scale);
    panY = my - (my - panY) * (newScale / scale);
    scale = newScale;
  } else if (e.ctrlKey) {
    // Horizontal scroll
    panX -= e.deltaY;
  } else {
    panX -= e.deltaX;
    panY -= e.deltaY;
  }
  applyPan();
}, { passive: false });
window.addEventListener('mousemove', e => {
  if (panning) { panX = e.clientX - panStart.x; panY = e.clientY - panStart.y; applyPan(); }
  if (dragState) {
    dragState.card.x = dragState.cx + (e.clientX - dragState.sx);
    dragState.card.y = dragState.cy + (e.clientY - dragState.sy);
    dragState.el.style.left = dragState.card.x + 'px';
    dragState.el.style.top  = dragState.card.y + 'px';
  }
  if (resizeState) {
    const w = Math.max(180, resizeState.sw + (e.clientX - resizeState.sx));
    const h = Math.max(60,  resizeState.sh + (e.clientY - resizeState.sy));
    resizeState.el.style.width = w + 'px';
    resizeState.bd.style.maxHeight = Math.max(40, h - 36) + 'px';
  }
});
window.addEventListener('mouseup', () => {
  if (panning)     { panning = false; viewport.style.cursor = 'default'; }
  if (dragState)   { dragState   = null; save(); }
  if (resizeState) { resizeState = null; save(); }
});

// ── Language maps ──
const LANG_COLOR = {
  javascript:'#f7df1e', typescript:'#3178c6', python:'#4b8bbe',
  bash:'#4eaa25', shell:'#4eaa25', css:'#264de4', html:'#e34c26',
  xml:'#f60', json:'#5b8dd9', yaml:'#cb171e', rust:'#dea584',
  go:'#00add8', java:'#ed8b00', c:'#a8b9cc', cpp:'#00599c',
  csharp:'#9b4f96', ruby:'#cc342d', sql:'#e38c00',
  markdown:'#a78bfa', text:'#55526b'
};
const LANG_LABEL = {
  javascript:'JS', typescript:'TS', python:'PY', bash:'SH', shell:'SH',
  css:'CSS', html:'HTML', xml:'XML', json:'JSON', yaml:'YAML',
  rust:'RS', go:'GO', java:'JAVA', c:'C', cpp:'C++', csharp:'C#',
  ruby:'RB', sql:'SQL', markdown:'MD', text:'TXT'
};
const DETECT = ['javascript','typescript','python','bash','css','html','xml',
  'json','yaml','rust','go','java','c','cpp','csharp','ruby','sql'];
const MD_RE = [/^#{1,6}\s/m, /\*\*[^*]+\*\*/, /\[.+\]\(.+\)/, /^[-*+]\s/m, /^>\s/m, /```/, /^---$/m];

function detectLang(t) {
  if (MD_RE.filter(r => r.test(t)).length >= 2) return 'markdown';
  try { return hljs.highlightAuto(t, DETECT).language || 'text'; } catch { return 'text'; }
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function unesc(s) {
  return String(s)
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
}

// ── Markdown rendering (post-process for mermaid + hljs) ──
function renderMarkdown(text) {
  // 1. Parse with marked — produces <pre><code class="language-X">...</code></pre>
  let html = marked.parse(text);

  // 2. Post-process code blocks
  html = html.replace(
    /<pre><code(?:\s+class="([^"]*)")?>([\s\S]*?)<\/code><\/pre>/gi,
    (match, cls, encoded) => {
      // Extract language from class like "language-mermaid"
      const lang = cls ? cls.replace(/^language-/, '') : '';
      const raw  = unesc(encoded);          // ← decode HTML entities

      if (lang === 'mermaid') {
        // Wrap in mermaid div — mermaid.run() will render it
        return '<div class="mermaid-wrap"><div class="mermaid">' + raw + '</div></div>';
      }

      // Re-highlight code blocks with hljs
      try {
        const v = (lang && hljs.getLanguage(lang))
          ? hljs.highlight(raw, { language: lang }).value
          : hljs.highlightAuto(raw).value;
        return '<pre><code class="hljs">' + v + '</code></pre>';
      } catch {
        return '<pre><code class="hljs">' + esc(raw) + '</code></pre>';
      }
    }
  );

  return '<div class="mdv">' + html + '</div>';
}

function renderBody(text, lang, showMd) {
  if (showMd) return renderMarkdown(text);
  try {
    const v = (lang && lang !== 'text' && lang !== 'markdown')
      ? hljs.highlight(text, { language: lang }).value
      : hljs.highlightAuto(text, DETECT).value;
    return '<pre><code class="hljs">' + v + '</code></pre>';
  } catch { return '<pre><code class="hljs">' + esc(text) + '</code></pre>'; }
}

// ── Mermaid rendering ──
function runMermaid(container) {
  if (typeof mermaid === 'undefined') return;
  const nodes = [...container.querySelectorAll('.mermaid:not([data-rendered])')];
  if (!nodes.length) return;
  nodes.forEach(n => n.setAttribute('data-rendered', '1'));

  // mermaid v10+: mermaid.run({ nodes })
  // mermaid v9:   mermaid.init(config, nodes)
  const p = typeof mermaid.run === 'function'
    ? mermaid.run({ nodes })
    : Promise.resolve(mermaid.init(undefined, nodes));

  if (p && typeof p.catch === 'function') {
    p.catch(err => {
      nodes.forEach(n => {
        if (!n.querySelector('svg'))
          n.innerHTML = '<div class="mermaid-err">Parse error — ' + esc(String(err)) + '</div>';
      });
    });
  }
}

// ── Cards ──
let cards = [], nextId = 0;

function makeCard(text, x, y, opts) {
  opts = opts || {};
  const id     = (opts.id !== undefined) ? opts.id : nextId++;
  const lang   = opts.lang   || detectLang(text);
  const showMd = (opts.showMd !== undefined) ? opts.showMd : (lang === 'markdown');
  const card   = { id, text, x, y, lang, showMd };
  if (opts.id === undefined) cards.push(card);

  const color = LANG_COLOR[lang] || LANG_COLOR.text;
  const label = LANG_LABEL[lang] || lang.slice(0, 4).toUpperCase();
  const lines = text.split('\n').length;

  const el = document.createElement('div');
  el.className  = 'card';
  el.style.cssText = 'left:' + x + 'px;top:' + y + 'px;z-index:' + (++zTop);

  const mdBtn = (lang === 'markdown')
    ? '<button class="cbtn md-btn' + (showMd ? ' on' : '') + '">&lang;/&rang;</button>'
    : '';

  el.innerHTML =
    '<div class="card-hd">'
    + '<span class="badge" style="background:' + color + '">' + label + '</span>'
    + '<span class="card-meta">' + lines + ' line' + (lines !== 1 ? 's' : '') + '</span>'
    + mdBtn
    + '<button class="cbtn edit-btn">&#9998;</button>'
    + '<button class="cbtn x-btn">&#x2715;</button>'
    + '</div>'
    + '<div class="card-bd">' + renderBody(text, lang, showMd) + '</div>'
    + '<div class="rh"></div>';

  canvas.appendChild(el);
  const bd = el.querySelector('.card-bd');
  if (showMd) runMermaid(bd);
  wire(el, card);
  return el;
}

function wire(el, card) {
  const hd      = el.querySelector('.card-hd');
  const bd      = el.querySelector('.card-bd');
  const xBtn    = el.querySelector('.x-btn');
  const editBtn = el.querySelector('.edit-btn');
  const mdBtn   = el.querySelector('.md-btn');
  const rh      = el.querySelector('.rh');
  let editing   = false;

  el.addEventListener('mousedown', () => { el.style.zIndex = ++zTop; }, true);

  // Scroll inside card — don't propagate to canvas pan
  bd.addEventListener('wheel',     e => e.stopPropagation(), { passive: true });
  bd.addEventListener('mousedown', e => e.stopPropagation());

  xBtn.addEventListener('click', e => {
    e.stopPropagation();
    el.remove();
    cards = cards.filter(c => c.id !== card.id);
    save();
  });

  editBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (editing) {
      const ta = bd.querySelector('textarea');
      if (ta) {
        card.text   = ta.value;
        card.lang   = detectLang(card.text);
        card.showMd = (card.lang === 'markdown');
        bd.innerHTML = renderBody(card.text, card.lang, card.showMd);
        if (card.showMd) runMermaid(bd);
        const b = el.querySelector('.badge');
        b.textContent  = LANG_LABEL[card.lang] || card.lang.slice(0, 4).toUpperCase();
        b.style.background = LANG_COLOR[card.lang] || LANG_COLOR.text;
        save();
      }
      editing = false;
      editBtn.innerHTML = '&#9998;';
    } else {
      bd.innerHTML = '<textarea spellcheck="false">' + esc(card.text) + '</textarea>';
      const ta = bd.querySelector('textarea');
      ta.addEventListener('mousedown', e => e.stopPropagation());
      ta.addEventListener('wheel',     e => e.stopPropagation(), { passive: true });
      ta.focus();
      editing = true;
      editBtn.innerHTML = '&#10003;';
    }
  });

  bd.addEventListener('dblclick', () => { if (!editing) editBtn.click(); });

  if (mdBtn) {
    mdBtn.addEventListener('click', e => {
      e.stopPropagation();
      card.showMd = !card.showMd;
      mdBtn.classList.toggle('on', card.showMd);
      bd.innerHTML = renderBody(card.text, card.lang, card.showMd);
      if (card.showMd) runMermaid(bd);
      save();
    });
  }

  hd.addEventListener('mousedown', e => {
    if (e.button !== 0 || e.target.classList.contains('cbtn')) return;
    dragState = { card, el, sx: e.clientX, sy: e.clientY, cx: card.x, cy: card.y };
    e.stopPropagation();
  });

  rh.addEventListener('mousedown', e => {
    e.stopPropagation();
    resizeState = { el, bd, sx: e.clientX, sy: e.clientY, sw: el.offsetWidth, sh: el.offsetHeight };
  });
}

// ── Paste → new card ──
document.addEventListener('paste', e => {
  const text = ((e.clipboardData || window.clipboardData).getData('text') || '').trim();
  if (!text) return;
  const vw = viewport.getBoundingClientRect();
  const j  = () => (Math.random() - 0.5) * 50;
  const x  = vw.width  / 2 - panX - 200 + j();
  const y  = vw.height / 2 - panY -  80 + j();
  const el = makeCard(text, x, y);
  el.style.cssText += ';opacity:0;transform:scale(0.88) translateY(6px);transition:opacity .2s,transform .2s';
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'scale(1) translateY(0)'; });
  document.getElementById('hint').classList.add('gone');
  save();
});

// ── Titlebar ──
document.getElementById('btn-close').addEventListener('click', () => ipcRenderer.send('close'));
document.getElementById('btn-min').addEventListener('click',   () => ipcRenderer.send('minimize'));

let pinned = true;
document.getElementById('btn-pin').addEventListener('click', () => {
  pinned = !pinned;
  const b = document.getElementById('btn-pin');
  b.innerHTML = pinned ? '&#128204; pinned' : '&#128204; float';
  b.classList.toggle('on', pinned);
  ipcRenderer.send('pin', pinned);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  canvas.innerHTML = '';
  cards = []; nextId = 0;
  save();
  document.getElementById('hint').classList.remove('gone');
});

// Spacebar → reset pan + zoom to home
document.addEventListener('keydown', e => {
  if (e.code !== 'Space') return;
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  e.preventDefault();
  panX = 0; panY = 0; scale = 1;
  applyPan();
});

// ── Persist ──
function save() {
  try { localStorage.setItem('mdway', JSON.stringify({ cards, nextId })); } catch (e) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('mdway') || 'null');
    if (d && d.cards && d.cards.length) {
      nextId = d.nextId || d.cards.length;
      d.cards.forEach(c => {
        cards.push(c);
        makeCard(c.text, c.x, c.y, { id: c.id, lang: c.lang, showMd: c.showMd });
      });
      document.getElementById('hint').classList.add('gone');
      return;
    }
  } catch (e) {}
  // Welcome card
  makeCard(
    '# MDway\n\nPaste code or markdown anywhere.\n\n'
    + '- **Ctrl+V** \u2014 drop a new card\n'
    + '- Drag **header** to move\n'
    + '- **Scroll** inside a card to read\n'
    + '- **Double-click** body to edit\n'
    + '- **\u27e8/\u27e9** toggles markdown render\n'
    + '- **Ctrl+Shift+I** \u2014 DevTools\n'
    + '- **\uD83D\uDCCC pinned** keeps this above all windows',
    50, 20, { lang: 'markdown', showMd: true }
  );
}

applyPan();
load();
</script>
</body>
</html>
